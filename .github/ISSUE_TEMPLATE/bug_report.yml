name: Bug report
description: Report a reproducible problem in Diffly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue.
        Please include enough detail to reproduce the problem locally.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that reproduce the issue.
      placeholder: |
        1. Open Diffly
        2. Compare these files
        3. Click this control
        4. Observe the result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS version, Diffly version, and any relevant file types or sizes.
      placeholder: Windows 11, Diffly v0.1.4-beta.1, comparing two large JSON files
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, logs, or other details.
