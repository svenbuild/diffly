name: Feature request
description: Suggest an improvement for Diffly.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation are you trying to improve?
      placeholder: Describe the pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
      placeholder: Explain the feature and how it should behave.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or other approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, or example tools are helpful here.
