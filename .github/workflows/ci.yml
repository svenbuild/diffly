name: CI

on:
  push:
    branches:
      - main
      - "migration/**"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Electron app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package Windows app
        run: npx electron-builder --win nsis --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: diffly-windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
